name: Build Python executables (Linux)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-ubuntu-22_04-python-3_10:
    name: Build Linux binary
    runs-on: ubuntu-22.04
    env:
      PYTHON_VERSION: '3.10'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pyinstaller
      - name: Build (PyInstaller --onefile)
        run: |
          pyinstaller --onefile mongo.py --name mongo-ubuntu-22.04-python-3.10
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: mongo-ubuntu-22.04-python-3.10
          path: dist/mongo-ubuntu-22.04-python-3.10